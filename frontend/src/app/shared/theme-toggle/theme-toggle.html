<div class="dropdown theme-toggle">
  <button
    type="button"
    class="btn btn-sm btn-outline-secondary theme-toggle-trigger"
    data-bs-toggle="dropdown"
    data-bs-display="static"
    aria-expanded="false"
    [attr.aria-label]="triggerLabel()"
    [title]="triggerLabel()"
  >
    <i class="bi" [class]="triggerIcon()" aria-hidden="true"></i>
  </button>

  <ul class="dropdown-menu dropdown-menu-end">
    @for (option of options; track option.mode) {
    <li>
      <button
        type="button"
        class="dropdown-item d-flex align-items-center gap-2"
        [class.active]="mode() === option.mode"
        [attr.aria-current]="mode() === option.mode"
        (click)="select(option.mode)"
      >
        <i class="bi" [class]="option.icon" aria-hidden="true"></i>
        <span>{{ option.label }}</span>
        @if (mode() === option.mode) {
        <i class="bi bi-check2 ms-auto" aria-hidden="true"></i>
        }
      </button>
    </li>
    }
  </ul>
</div>
