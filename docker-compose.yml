---
services:
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.example.com
    environment:
      # The UI writes postfix-accounts.cf / dovecot-quotas.cf directly, which
      # only docker-mailserver's FILE provisioner reads. Quotas require it too.
      - ACCOUNT_PROVISIONER=FILE
      - ENABLE_QUOTAS=1
      # The UI reads DKIM records from opendkim/keys; Rspamd stores them
      # elsewhere, so the two toggles must stay as they are here.
      - ENABLE_OPENDKIM=1
      - ENABLE_RSPAMD=0
      # Required by the published 4190 port, otherwise nothing listens on it.
      - ENABLE_MANAGESIEVE=1
      - ENABLE_FAIL2BAN=1
      # Spam and virus filtering. Amavis drives both SpamAssassin and ClamAV, so
      # it cannot be turned off while either is on. The whole stack is mutually
      # exclusive with ENABLE_RSPAMD, which reimplements all of it.
      - ENABLE_AMAVIS=1
      - ENABLE_SPAMASSASSIN=1
      - SPAMASSASSIN_SPAM_TO_INBOX=1
      - MOVE_SPAM_TO_JUNK=1
      # Spam score thresholds: add headers, flag as spam, then reject outright.
      - SA_TAG=2.0
      - SA_TAG2=6.31
      - SA_KILL=10.0
      # ClamAV needs roughly 1 GB of RAM, and stays down for the minutes
      # freshclam spends downloading its signatures on first start.
      - ENABLE_CLAMAV=1
      - CLAMAV_MESSAGE_SIZE_LIMIT=25M
      # Greylisting: an unknown sender is deferred once, then auto-whitelisted
      # after POSTGREY_AUTO_WHITELIST_CLIENTS successful deliveries.
      - ENABLE_POSTGREY=1
      - POSTGREY_DELAY=300
      - POSTGREY_MAX_AGE=35
      - POSTGREY_AUTO_WHITELIST_CLIENTS=5
      - POSTGREY_TEXT=Delayed by Postgrey
      # Update notices are mailed to POSTMASTER_ADDRESS, which must accept mail
      # or every check bounces.
      - ENABLE_UPDATE_CHECK=1
      - UPDATE_CHECK_INTERVAL=1d
      - POSTMASTER_ADDRESS=${POSTMASTER_ADDRESS:-postmaster@example.com}
      - SSL_TYPE=${SSL_TYPE:-}
      - LOG_LEVEL=${MAILSERVER_LOG_LEVEL:-info}
    cap_add:
      - NET_ADMIN
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      - "4190:4190"
    volumes:
      - mailserver-mail:/var/mail
      - mailserver-config:/tmp/docker-mailserver/
      # Postfix/Dovecot runtime state, including the fail2ban ban database the
      # UI manages: without it every ban is lost when the container is recreated.
      - mailserver-state:/var/mail-state
      # The UI tails /var/log/mail/mail.log.
      - mailserver-logs:/var/log/mail
    restart: unless-stopped

  mailserver-ui:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mailserver
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAILSERVER_CONTAINER=${MAILSERVER_CONTAINER:-mailserver}
    ports:
      - "8000:8000"
    volumes:
      - mailserver-ui:/var/lib/mailserver-ui
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mailserver-mail:
  mailserver-config:
  mailserver-state:
  mailserver-logs:
  mailserver-ui:
