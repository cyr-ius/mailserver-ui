---
services:
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.example.com
    environment:
      - ACCOUNT_PROVISIONER=FILE
      - ENABLE_QUOTAS=1
      - ENABLE_OPENDKIM=0
      - ENABLE_OPENDMARC=0
      - ENABLE_POLICYD_SPF=0
      - ENABLE_AMAVIS=0
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_RSPAMD=1
      - ENABLE_MANAGESIEVE=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_CLAMAV=1
      - CLAMAV_MESSAGE_SIZE_LIMIT=25M
      - ENABLE_POSTGREY=0
      - RSPAMD_GREYLISTING=1
      - ENABLE_UPDATE_CHECK=1
      - UPDATE_CHECK_INTERVAL=1d
      - POSTMASTER_ADDRESS=${POSTMASTER_ADDRESS:-postmaster@example.com}
      - SSL_TYPE=${SSL_TYPE:-}
      - LOG_LEVEL=${MAILSERVER_LOG_LEVEL:-info}
    cap_add:
      - NET_ADMIN
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      - "4190:4190"
    volumes:
      - mailserver-mail:/var/mail
      - mailserver-config:/tmp/docker-mailserver/
      - mailserver-state:/var/mail-state
      - mailserver-logs:/var/log/mail
    restart: unless-stopped

  mailserver-ui:
    image: ghcr.io/cyr-ius/mailserver-ui:latest
    depends_on:
      - mailserver
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAILSERVER_CONTAINER=${MAILSERVER_CONTAINER:-mailserver}
    ports:
      - "8000:8000"
    volumes:
      - mailserver-ui:/var/lib/mailserver-ui
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mailserver-mail:
  mailserver-config:
  mailserver-state:
  mailserver-logs:
  mailserver-ui:
